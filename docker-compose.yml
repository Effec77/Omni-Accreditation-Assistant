services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: accreditation-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
      - PYTHONUNBUFFERED=1
    env_file:
      - accreditation_copilot/.env
    volumes:
      - ./data:/app/data
      - ./accreditation_copilot/data:/app/accreditation_copilot/data
      - ./accreditation_copilot/api/indexes:/app/accreditation_copilot/api/indexes
      - ./accreditation_copilot/api/data:/app/accreditation_copilot/api/data
    networks:
      - accreditation-network

networks:
  accreditation-network:
    driver: bridge
