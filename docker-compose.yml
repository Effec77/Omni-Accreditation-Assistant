services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: accreditation-backend
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
      - PYTHONUNBUFFERED=1
      - PYTHONPATH=/app/accreditation_copilot
    env_file:
      - accreditation_copilot/.env
    volumes:
      - ./data:/app/data
      - ./accreditation_copilot/data:/app/accreditation_copilot/data
      - ./accreditation_copilot/api/indexes:/app/accreditation_copilot/api/indexes
      - ./accreditation_copilot/api/data:/app/accreditation_copilot/api/data
    networks:
      - accreditation-network

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    container_name: accreditation-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_PUBLIC_API_URL=http://13.232.129.54:8000
    networks:
      - accreditation-network
